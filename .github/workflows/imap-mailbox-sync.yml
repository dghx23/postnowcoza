# Poll Zoho print-agent mailbox (EpsonMail / owner notifications) every 5 minutes.
# Works on Vercel Hobby (which only allows one daily Vercel Cron).
#
# Required GitHub repo secrets:
#   CRON_SECRET  — same value as Vercel env CRON_SECRET
#   APP_URL      — https://app.postnow.co.za  (no trailing slash)
#
name: IMAP mailbox sync (5 min)

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: POST /api/epson/notifications/sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          APP_URL: ${{ secrets.APP_URL }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET:-}" ] || [ -z "${APP_URL:-}" ]; then
            echo "Missing GitHub secrets CRON_SECRET and/or APP_URL — skipping."
            echo "Set them under repo Settings → Secrets and variables → Actions."
            exit 0
          fi
          BASE="${APP_URL%/}"
          echo "Polling ${BASE}/api/epson/notifications/sync …"
          code=$(curl -sS -o /tmp/imap-sync.json -w "%{http_code}" -X POST \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --max-time 90 \
            "${BASE}/api/epson/notifications/sync")
          echo "HTTP ${code}"
          cat /tmp/imap-sync.json || true
          echo ""
          if [ "$code" != "200" ]; then
            exit 1
          fi
